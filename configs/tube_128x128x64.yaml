# 3D tube — 128×128×64 (same physics as tube_3d.yaml, more axial resolution)

grid:
  Nx: 128
  Ny: 128
  Nz: 64
  wall_radius: 0.45
  tube_length: 1.0
  wall_z_periodic: 1
  g_noise_init: 0.05
  heat_profile:
    cx: 0.5
    cy: 0.5
    cz: 0.5
    rx: 0.1
    ry: 0.1
    rz: 0.05
    peak: 1.0

time:
  dt: 0.005

tensor_S:
  eig_lo: 0.25
  eig_hi: 1000.0

resolution:
  l0: 0.5
  alpha: 1.0

heater:
  type: constant
  power: 5.0

g_response:
  grad_kappa: 5.0
  grad_tau: 0.3
  grad_E_ref: 1.0

medium:
  cord_radius: 0.2
  cord_mass: 1.0
  m0: 0.5
  m_ref: 1.0
  alpha_m: 1.0

wall:
  cooling: 2.0
  E_max: 100.0
  sink_E_gain: 50.0
  edge_mass: 20.0
  rad_alpha: 0.0

equilibrium:
  chi_parallel: 1.0
  chi_perp: 1.0

field:
  V_loop: 0.01
  spitzer_exp: 1.5
  Bz_ext: 2.0
  poisson_iters: 64
  update_every: 1
  sor_omega: 1.7
  inv_aspect_ratio: 0.1
  cent_C0: 1.0
  cent_bias_cterm: 1.0

charge:
  ionization_k: 1.0
  mass_scale: 1.0
  R0: 0.01
  j_scale: 1.0

beams:
  n_beams: 0
  sigma_r: 0.03
  sigma_z: 0.05
  power: 500.0
  r0: 0.15

seed: 42
