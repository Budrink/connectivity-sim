# GPU demo on 512x512

grid:
  Nx: 512
  Ny: 512
  wall_radius: 0.45
  g_noise_init: 0.05

time:
  dt: 0.005

tensor_S:
  eig_lo: 0.25

heater:
  type: target
  power: 5.0
  E_target: 2.0
  k_heat: 2.0
  cx: 0.5
  cy: 0.5
  rx: 0.2
  ry: 0.2
  peak: 1.0

g_response:
  grad_kappa: 5.0
  grad_tau: 0.3
  grad_E_ref: 1.0

seed: 42
