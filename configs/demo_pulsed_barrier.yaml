# Demo: Pulsed heater creates barrier oscillation

grid:
  Nx: 256
  Ny: 256

radiation:
  gamma_rad: 0.001
  rad_exp: 1.5

wall:
  radius: 0.45
  cooling: 0.5
  E_max: 50.0

tensor_S:
  eig_lo: 0.5

heater:
  type: pulsed
  power: 1.0
  period: 2.0
  duty: 0.5
  cx: 0.5
  cy: 0.5
  rx: 0.12
  ry: 0.12
  peak: 1.0

g_response:
  grad_kappa: 8.0
  grad_tau: 0.3
  grad_E_ref: 1.0
