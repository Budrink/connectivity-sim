# 3D tube with self-consistent B-field
# 128x128 cross-section, 256 axial layers, periodic z

grid:
  Nx: 128
  Ny: 128
  Nz: 32
  wall_radius: 0.45
  tube_length: 1.0
  wall_z_periodic: 1
  g_noise_init: 0.05
  heat_profile:
    cx: 0.5
    cy: 0.5
    cz: 0.5
    rx: 0.2
    ry: 0.2
    rz: 0.05
    peak: 1.0

time:
  dt: 0.005

tensor_S:
  eig_lo: 0.25
  eig_hi: 1000.0

resolution:
  l0: 0.5
  alpha: 1.0

heater:
  type: target
  power: 5.0
  E_target: 2.0
  k_heat: 2.0

g_response:
  grad_kappa: 5.0
  grad_tau: 0.3
  grad_E_ref: 1.0

radiation:
  gamma_rad: 0.001
  rad_exp: 1.5

wall:
  cooling: 2.0
  E_max: 100.0

equilibrium:
  chi_parallel: 1.0
  chi_perp: 1.0

field:
  V_loop: 0.01
  spitzer_exp: 1.5
  Bz_ext: 2.0
  poisson_iters: 500
  update_every: 2
  sor_omega: 1.7
  kappa: 10.0
  beta_scale: 10.0
  inv_aspect_ratio: 0.1

beams:
  n_beams: 0
  sigma_r: 0.03
  sigma_z: 0.05
  power: 500.0
  r0: 0.15

seed: 42
