# 3D tube: same heater / wall / tensor / beta intent as the old 2D file, but all keys
# match load_sim_params() in gpu_grid.cu (Nz>1, grid.wall_radius, etc.).

grid:
  Nx: 128
  Ny: 128
  Nz: 32
  wall_radius: 0.45
  tube_length: 1.0
  wall_z_periodic: 1
  num_pair_maps: 32
  g_noise_init: 0.05
  heat_profile:
    cx: 0.5
    cy: 0.5
    cz: 0.5
    rx: 0.06
    ry: 0.06
    rz: 0.08
    peak: 1.0

time:
  dt: 0.005

tensor_S:
  eig_lo: 0.5
  eig_hi: 1000.0

resolution:
  l0: 0.5
  alpha: 1.0

heater:
  type: target
  power: 2.0
  E_target: 1.5
  k_heat: 2.0
  cx: 0.5
  cy: 0.5
  rx: 0.06
  ry: 0.06
  peak: 1.0
  response_tau: 0.4

g_response:
  grad_kappa: 2.0
  grad_tau: 0.3
  grad_E_ref: 1.0

medium:
  cord_radius: 0.8
  cord_mass: 1.0
  m0: 0.5
  m_ref: 1.0
  alpha_m: 1.0

wall:
  cooling: 0.5
  E_max: 50.0

beta:
  limit: 150.0

equilibrium:
  chi_parallel: 1.0
  chi_perp: 1.0

field:
  V_loop: 0.01
  spitzer_exp: 1.5
  Bz_ext: 5.0
  poisson_iters: 120
  update_every: 4
  sor_omega: 1.7
  kappa: 1.0
  inv_aspect_ratio: 0.1

beams:
  n_beams: 0
  sigma_r: 0.03
  sigma_z: 0.05
  power: 500.0
  r0: 0.15

seed: 42
